<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>World of Pirates</title>
    </head>
    <body>
        <div class="app">
            <div class="header">
                <div class="hero">Battleship</div>
            </div>
            <div class="main">
                <div class="message">
                    <div id="player-msg">
                        <img alt="" src="./assets/images/hero.png" />
                        <div class="message-box">
                            <h1>You Suck.</h1>
                        </div>
                    </div>
                    <div id="bot-msg">
                        <div class="message-box">
                            <h1>Stupid fella.</h1>
                        </div>
                        <img alt="" src="./assets/images/villain.png" />
                    </div>
                </div>
                <div class="boards">
                    <div id="player-board">
                        <div id="player-area" class="area"></div>
                        <div class="ships">
                            <img
                                src="./assets/images/ship-2.svg"
                                class="ship-icon ship-2"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-2.svg"
                                class="ship-icon ship-2"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-3.svg"
                                class="ship-icon ship-3"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-4.svg"
                                class="ship-icon ship-4"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-5.svg"
                                class="ship-icon ship-5"
                                alt=""
                            />
                        </div>
                    </div>
                    <div id="bot-board">
                        <div class="ships">
                            <img
                                src="./assets/images/ship-2.svg"
                                class="ship-icon ship-2"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-2.svg"
                                class="ship-icon ship-2"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-3.svg"
                                class="ship-icon ship-3"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-4.svg"
                                class="ship-icon ship-4"
                                alt=""
                            />
                            <img
                                src="./assets/images/ship-5.svg"
                                class="ship-icon ship-5"
                                alt=""
                            />
                        </div>
                        <div id="bot-area" class="area"></div>
                    </div>
                </div>
            </div>
            <div class="footer">
                <a href="https://github.com/Andmana/Battleship">
                    Here's the code
                    <img alt="" src="./assets/images/github.svg" />
                </a>
            </div>
        </div>
    </body>
</html>
